name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - work        # auto-build artifacts on every push to work branch
  workflow_dispatch:   # allows manual test runs without a tag

jobs:
  # ─────────────────────────── macOS ────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.3'
          cache: true

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package DMG
        run: |
          macdeployqt build/dice.app -dmg
          mv build/dice.dmg dice-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: dice-macos
          path: dice-macos.dmg

  # ─────────────────────────── Windows ──────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.3'
          cache: true

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item build\Release\dice.exe dist\
          windeployqt dist\dice.exe --release --no-translations
          Copy-Item -Recurse best dist\best
          Compress-Archive -Path dist\* -DestinationPath dice-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: dice-windows
          path: dice-windows.zip

  # ─────────────────────────── Linux ────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qtbase5-dev libqt5widgets5 \
            cmake build-essential libfuse2

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Package tar.gz
        run: |
          mkdir -p dist
          cp build/dice dist/

          # Copy Qt and system libs needed at runtime
          ldd build/dice | awk '/=>/ { print $3 }' | grep -E 'libQt|libGL|libicu' | \
            xargs -I{} cp --no-clobber {} dist/ 2>/dev/null || true

          # Launch wrapper that sets library path relative to itself
          cat > dist/run.sh << 'RUNEOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$DIR:$LD_LIBRARY_PATH"
          exec "$DIR/dice" "$@"
          RUNEOF
          chmod +x dist/run.sh dist/dice
          cp -r best dist/best

          tar -czf dice-linux.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: dice-linux
          path: dice-linux.tar.gz

  # ──────────────────── Publish GitHub Release ──────────────────
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    # Only publish a real release when triggered by a tag push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dice-macos/dice-macos.dmg
            dice-windows/dice-windows.zip
            dice-linux/dice-linux.tar.gz
