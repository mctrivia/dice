name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - work        # auto-build artifacts on every push to work branch
  workflow_dispatch:   # allows manual test runs without a tag

jobs:
  # ─────────────────────────── macOS ────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.3'
          cache: true

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package DMG
        run: |
          macdeployqt build/dice.app -dmg
          mv build/dice.dmg dice-macos.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: dice-macos
          path: dice-macos.dmg

  # ─────────────────────────── Windows ──────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.3'
          cache: true

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item build\Release\dice.exe dist\
          windeployqt dist\dice.exe --release --no-translations
          Copy-Item -Recurse best dist\best
          Compress-Archive -Path dist\* -DestinationPath dice-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: dice-windows
          path: dice-windows.zip

  # ─────────────────────────── Linux ────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qtbase5-dev libqt5widgets5 \
            cmake build-essential libfuse2

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Package AppImage
        run: |
          # Install linuxdeployqt
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O linuxdeployqt
          chmod +x linuxdeployqt

          # Set up AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/dice AppDir/usr/bin/
          cp -r best AppDir/usr/bin/best

          # Create .desktop file
          cat > AppDir/usr/share/applications/dice.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Dice Optimizer
          Exec=dice
          Icon=dice
          Type=Application
          Categories=Utility;
          DESKTOP
          # linuxdeployqt needs .desktop at AppDir root
          cp AppDir/usr/share/applications/dice.desktop AppDir/

          # Create a simple icon (solid square as placeholder)
          convert -size 256x256 xc:steelblue AppDir/usr/share/icons/hicolor/256x256/apps/dice.png 2>/dev/null || \
            touch AppDir/usr/share/icons/hicolor/256x256/apps/dice.png
          cp AppDir/usr/share/icons/hicolor/256x256/apps/dice.png AppDir/dice.png

          # Build AppImage
          ./linuxdeployqt AppDir/usr/bin/dice -appimage -no-translations

          mv Dice_Optimizer-*.AppImage dice-linux.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: dice-linux
          path: dice-linux.AppImage

  # ──────────────────── Publish GitHub Release ──────────────────
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    # Only publish a real release when triggered by a tag push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dice-macos/dice-macos.dmg
            dice-windows/dice-windows.zip
            dice-linux/dice-linux.AppImage
